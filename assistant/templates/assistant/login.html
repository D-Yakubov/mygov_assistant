<!-- assistant/templates/assistant/login.html -->
<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tizimga kirish - MyGov Assistant</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
</head>
<body class="bg-gray-100 flex items-center justify-center h-screen">

    <div class="bg-white p-8 rounded-2xl shadow-xl w-full max-w-md">
        <h2 class="text-2xl font-bold text-center text-gray-800 mb-6">Tizimga kirish</h2>
        
        <!-- Xatoliklar chiqsa ko'rsatish -->
        {% if form.errors %}
            <div class="bg-red-100 border border-red-400 text-red-700 px-4 py-2 rounded-lg mb-4 text-sm">
                Email yoki parol noto'g'ri kiritildi.
            </div>
        {% endif %}

        <form method="POST" class="space-y-4">
            {% csrf_token %}
            
            {% for field in form %}
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">
                        {% if field.name == 'username' %}Email{% else %}{{ field.label }}{% endif %}
                    </label>
                    {{ field }}
                </div>
            {% endfor %}
            
            <button type="submit" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-semibold py-2 px-4 rounded-lg transition duration-200 cursor-pointer">
                Kirish
            </button>
        </form>

        <div class="mt-6 text-center text-sm text-gray-600">
            Hisobingiz yo'qmi? <a href="{% url 'register' %}" class="text-blue-600 hover:underline">Ro'yxatdan o'ting</a>
        </div>
    </div>

</body>
</html>
